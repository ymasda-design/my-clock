<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JR風アナログ時計 ＆ カレンダーウィジェット</title>
    <style>
        /* 画面全体の背景 */
        body {
            font-family: 'Arial Black', 'Hiragino Kaku Gothic ProN', sans-serif;
            background-color: #111111;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        /* 【重要】画像の「ダークグリーンの本体」と「黄緑の太い外枠」を完全再現 */
        .widget-container {
            background-color: #004722; /* 深いダークグリーン */
            border: 6px solid #bfff00; /* 鮮やかな黄緑の角丸枠 */
            border-radius: 30px;
            width: 360px;
            padding: 24px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        /* ==============================
           時計セクション（画像のデザインを再現）
        ============================== */
        .clock-section {
            position: relative;
            width: 220px;
            height: 220px;
            background-color: #bfff00; /* 画像と同じ鮮やかな黄緑の文字盤 */
            border-radius: 50%;
        }

        /* 時計の中心のピン（黒い円に白いドット） */
        .clock-center {
            position: absolute;
            width: 14px;
            height: 14px;
            background: #000000;
            border: 2px solid #ffffff;
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
        }

        /* 文字盤の数字（1〜12の太字） */
        .clock-number {
            position: absolute;
            width: 30px;
            height: 30px;
            font-size: 22px;
            font-weight: 900;
            color: #000000;
            text-align: center;
            line-height: 30px;
            left: calc(50% - 15px);
            top: calc(50% - 15px);
        }

        /* 各針のデザイン（画像通りの太さと形状） */
        .hand {
            position: absolute;
            bottom: 50%;
            left: 50%;
            transform-origin: bottom center;
            z-index: 5;
        }

        /* どっしり太い短針 */
        .hour-hand {
            width: 10px;
            height: 50px;
            background: #000000;
            margin-left: -5px;
            border-radius: 5px 5px 3px 3px;
        }

        /* スラッと長い長針 */
        .minute-hand {
            width: 6px;
            height: 85px;
            background: #000000;
            margin-left: -3px;
            border-radius: 3px 3px 0 0;
        }

        /* 鮮やかなオレンジの細い秒針 */
        .second-hand {
            width: 2px;
            height: 90px;
            background: #ff5500; /* 画像のオレンジ色 */
            margin-left: -1px;
        }

        /* ==============================
           カレンダーセクション（時計の色合いに統一）
        ============================== */
        .calendar-section {
            width: 100%;
            border-top: 2px dashed rgba(191, 255, 0, 0.3); /* 黄緑の点線区切り */
            padding-top: 16px;
        }

        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
        }

        /* 年月表示（黄緑の光る文字） */
        .calendar-header h2 {
            margin: 0;
            font-size: 20px;
            color: #bfff00;
            font-weight: bold;
        }

        /* 前月・次月ボタン */
        .nav-btn {
            background: #002d15;
            border: 1px solid #bfff00;
            color: #bfff00;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            padding: 6px 14px;
            border-radius: 6px;
            transition: background 0.2s;
        }

        .nav-btn:hover {
            background-color: #bfff00;
            color: #004722;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 6px;
            text-align: center;
        }

        /* 曜日の色（ベースは白、土日は見やすく調整） */
        .day-of-week {
            font-size: 13px;
            font-weight: bold;
            color: #ffffff;
            padding-bottom: 6px;
            border-bottom: 1px solid rgba(191, 255, 0, 0.4);
        }

        /* 日付のマス */
        .calendar-day {
            font-size: 14px;
            font-weight: bold;
            color: #ffffff;
            height: 34px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 6px;
            transition: background 0.2s;
        }

        .calendar-day:hover:not(.empty) {
            background-color: rgba(191, 255, 0, 0.15);
        }

        .empty {
            cursor: default;
        }

        /* 「今日」を時計と同じ黄緑色で反転ハイライト */
        .today {
            background-color: #bfff00 !important;
            color: #004722 !important;
            font-weight: 900;
            box-shadow: 0 0 10px rgba(191, 255, 0, 0.5);
        }

        /* 土曜（明るい青）と日曜（明るい赤）の色分け */
        .day-of-week:nth-child(7n+1), .calendar-grid div:nth-child(7n+1):not(.empty):not(.today) {
            color: #ff6666;
        }
        .day-of-week:nth-child(7n), .calendar-grid div:nth-child(7n):not(.empty):not(.today) {
            color: #66b2ff;
        }
    </style>
</head>
<body>

    <div class="widget-container">
        <!-- 【アナログ時計エリア（完全再現版）】 -->
        <div class="clock-section">
            <!-- 1〜12の数字をJavaScriptで円状に正確に配置 -->
            <div id="clock-numbers"></div>
            
            <div class="hand hour-hand" id="hour-hand"></div>
            <div class="hand minute-hand" id="minute-hand"></div>
            <div class="hand second-hand" id="second-hand"></div>
            <div class="clock-center"></div>
        </div>

        <!-- 【色合いを合わせたカレンダーエリア】 -->
        <div class="calendar-section">
            <div class="calendar-header">
                <button class="nav-btn" id="prev-month">前月</button>
                <h2 id="month-year-display">----年 --月</h2>
                <button class="nav-btn" id="next-month">次月</button>
            </div>
            <div class="calendar-grid" id="calendar-days"></div>
        </div>
    </div>

    <script>
        /* ==============================
           時計の数字を画像と同じ位置に配置
        ============================== */
        const numbersContainer = document.getElementById('clock-numbers');
        const radius = 82; // 中心からの距離(px)

        for (let i = 1; i <= 12; i++) {
            const numDiv = document.createElement('div');
            numDiv.classList.add('clock-number');
            numDiv.textContent = i;
            
            // 角度の計算（12時が0度、1時間は30度）
            const angle = (i * 30) * (Math.PI / 180);
            const x = Math.sin(angle) * radius;
            const y = -Math.cos(angle) * radius;
            
            // CSSの移動で数字を丸く並べる
            numDiv.style.transform = `translate(${x}px, ${y}px)`;
            numbersContainer.appendChild(numDiv);
        }

        /* ==============================
           時計の針を動かす処理
        ============================== */
        function updateClock() {
            const now = new Date();
            const hours = now.getHours();
            const minutes = now.getMinutes();
            const seconds = now.getSeconds();

            // 画像のコチコチ動く仕様（ステップ運針）
            const secondDeg = seconds * 6;
            const minuteDeg = (minutes * 6) + (seconds * 0.1);
            const hourDeg = ((hours % 12) * 30) + (minutes * 0.5);

            document.getElementById('second-hand').style.transform = `rotate(${secondDeg}deg)`;
            document.getElementById('minute-hand').style.transform = `rotate(${minuteDeg}deg)`;
            document.getElementById('hour-hand').style.transform = `rotate(${hourDeg}deg)`;
        }

        setInterval(updateClock, 1000);
        updateClock();


        /* ==============================
           カレンダーの処理
        ============================== */
        const display = document.getElementById('month-year-display');
        const daysContainer = document.getElementById('calendar-days');
        const prevBtn = document.getElementById('prev-month');
        const nextBtn = document.getElementById('next-month');

        let calendarDate = new Date();
        const weekdays = ['日', '月', '火', '水', '木', '金', '土'];

        function renderCalendar() {
            daysContainer.innerHTML = '';

            const year = calendarDate.getFullYear();
            const month = calendarDate.getMonth();

            display.textContent = `${year}年 ${month + 1}月`;

            weekdays.forEach(day => {
                const dayHeader = document.createElement('div');
                dayHeader.classList.add('day-of-week');
                dayHeader.textContent = day;
                daysContainer.appendChild(dayHeader);
            });

            const firstDayIndex = new Date(year, month, 1).getDay();
            const lastDay = new Date(year, month + 1, 0).getDate();
            const today = new Date();

            for (let i = 0; i < firstDayIndex; i++) {
                const emptyCell = document.createElement('div');
                emptyCell.classList.add('calendar-day', 'empty');
                daysContainer.appendChild(emptyCell);
            }

            for (let day = 1; day <= lastDay; day++) {
                const dayCell = document.createElement('div');
                dayCell.classList.add('calendar-day');
                dayCell.textContent = day;

                if (day === today.getDate() && month === today.getMonth() && year === today.getFullYear()) {
                    dayCell.classList.add('today');
                }

                daysContainer.appendChild(dayCell);
            }
        }
