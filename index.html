<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JR風アナログ時計 ＆ カレンダーウィジェット（修正版）</title>
    <style>
        /* 画面全体の背景 */
        body {
            font-family: 'Arial Black', 'Hiragino Kaku Gothic ProN', sans-serif;
            background-color: #111111;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        /* 外枠デザインの完全再現 */
        .widget-container {
            background-color: #004722; /* 深いダークグリーン */
            border: 6px solid #bfff00; /* 鮮やかな黄緑の角丸枠 */
            border-radius: 30px;
            width: 360px;
            padding: 24px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        /* ==============================
           時計セクション（確実な手動配置版）
        ============================== */
        .clock-section {
            position: relative;
            width: 220px;
            height: 220px;
            background-color: #bfff00; /* 鮮やかな黄緑の文字盤 */
            border-radius: 50%;
        }

        /* 時計の中心のピン */
        .clock-center {
            position: absolute;
            width: 14px;
            height: 14px;
            background: #000000;
            border: 2px solid #ffffff;
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
        }

        /* 1〜12の数字をCSSで確実に外周へ固定配置 */
        .clock-number {
            position: absolute;
            width: 30px;
            height: 30px;
            font-size: 22px;
            font-weight: 900;
            color: #000000;
            text-align: center;
            line-height: 30px;
        }
        /* 各数字の個別位置（エラーが起きない絶対座標指定） */
        .n12 { top: 5px;   left: calc(50% - 15px); }
        .n1  { top: 18px;  left: 152px; }
        .n2  { top: 52px;  left: 184px; }
        .n3  { top: 95px;  left: 195px; }
        .n4  { top: 138px; left: 184px; }
        .n5  { top: 172px; left: 152px; }
        .n6  { bottom: 5px; left: calc(50% - 15px); }
        .n7  { top: 172px; left: 38px; }
        .n8  { top: 138px; left: 6px; }
        .n9  { top: 95px;  left: -5px; }
        .n10 { top: 52px;  left: 6px; }
        .n11 { top: 18px;  left: 38px; }

        /* 各針のデザイン（画像通りの形状） */
        .hand {
            position: absolute;
            bottom: 50%;
            left: 50%;
            transform-origin: bottom center;
            z-index: 5;
        }

        /* どっしり太い短針 */
        .hour-hand {
            width: 10px;
            height: 52px;
            background: #000000;
            margin-left: -5px;
            border-radius: 5px 5px 2px 2px;
        }

        /* スラッと長い長針 */
        .minute-hand {
            width: 6px;
            height: 85px;
            background: #000000;
            margin-left: -3px;
            border-radius: 3px 3px 0 0;
        }

        /* 鮮やかなオレンジの細い秒針 */
        .second-hand {
            width: 2px;
            height: 90px;
            background: #ff5500;
            margin-left: -1px;
        }

        /* ==============================
           カレンダーセクション
        ============================== */
        .calendar-section {
            width: 100%;
            border-top: 2px dashed rgba(191, 255, 0, 0.3); /* 黄緑の点線区切り */
            padding-top: 16px;
        }

        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
        }

        /* 年月表示 */
        .calendar-header h2 {
            margin: 0;
            font-size: 20px;
            color: #bfff00;
            font-weight: bold;
        }

        /* 前月・次月ボタン */
        .nav-btn {
            background: #002d15;
            border: 1px solid #bfff00;
            color: #bfff00;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            padding: 6px 14px;
            border-radius: 6px;
            transition: background 0.2s;
        }

        .nav-btn:hover {
            background-color: #bfff00;
            color: #004722;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 6px;
            text-align: center;
        }

        /* 曜日の行 */
        .day-of-week {
            font-size: 13px;
            font-weight: bold;
            color: #ffffff;
            padding-bottom: 6px;
            border-bottom: 1px solid rgba(191, 255, 0, 0.4);
        }

        /* 日付のマス */
        .calendar-day {
            font-size: 14px;
            font-weight: bold;
            color: #ffffff;
            height: 34px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 6px;
        }

        .calendar-day:hover:not(.empty) {
            background-color: rgba(191, 255, 0, 0.2);
            cursor: pointer;
        }

        .empty {
            cursor: default;
        }

        /* 「今日」を時計と同じ黄緑色で反転ハイライト */
        .today {
            background-color: #bfff00 !important;
            color: #004722 !important;
            font-weight: 900;
            box-shadow: 0 0 10px rgba(191, 255, 0, 0.5);
        }

        /* 土日の識別カラー */
        .day-of-week:nth-child(7n+1), .calendar-grid div:nth-child(7n+1):not(.empty):not(.today) {
            color: #ff6666; /* 日曜（赤） */
        }
        .day-of-week:nth-child(7n), .calendar-grid div:nth-child(7n):not(.empty):not(.today) {
            color: #66b2ff; /* 土曜（青） */
        }
    </style>
</head>
<body>

    <div class="widget-container">
        <!-- 【アナログ時計エリア（確実固定表示版）】 -->
        <div class="clock-section">
            <!-- 1〜12の数字をHTML側で最初から配置 -->
            <div class="clock-number n12">12</div>
            <div class="clock-number n1">1</div>
            <div class="clock-number n2">2</div>
            <div class="clock-number n3">3</div>
            <div class="clock-number n4">4</div>
            <div class="clock-number n5">5</div>
            <div class="clock-number n6">6</div>
            <div class="clock-number n7">7</div>
            <div class="clock-number n8">8</div>
            <div class="clock-number n9">9</div>
            <div class="clock-number n10">10</div>
            <div class="clock-number n11">11</div>
            
            <!-- 時計の針 -->
            <div class="hand hour-hand" id="hour-hand"></div>
            <div class="hand minute-hand" id="minute-hand"></div>
            <div class="hand second-hand" id="second-hand"></div>
            <div class="clock-center"></div>
        </div>

        <!-- 【カレンダーエリア】 -->
        <div class="calendar-section">
            <div class="calendar-header">
                <button class="nav-btn" id="prev-month">前月</button>
                <h2 id="month-year-display">----年 --月</h2>
                <button class="nav-btn" id="next-month">次月</button>
            </div>
            <div class="calendar-grid" id="calendar-days">
                <!-- ここにカレンダーの日付が生成されます -->
            </div>
        </div>
    </div>

    <script>
        /* ==============================
           時計の針を現在時刻に動かす処理
        ============================== */
        function updateClock() {
            const now = new Date();
            const hours = now.getHours();
            const minutes = now.getMinutes();
            const seconds = now.getSeconds();

            // 1秒ごとにカチカチ動く設定
            const secondDeg = seconds * 6;
            const minuteDeg = (minutes * 6) + (seconds * 0.1);
            const hourDeg = ((hours % 12) * 30) + (minutes * 0.5);

            document.getElementById('second-hand').style.transform = `rotate(${secondDeg}deg)`;
            document.getElementById('minute-hand').style.transform = `rotate(${minuteDeg}deg)`;
            document.getElementById('hour-hand').style.transform = `rotate(${hourDeg}deg)`;
        }

        // 1秒ごとに時計を更新
        setInterval(updateClock, 1000);
        updateClock();


        /* ==============================
           カレンダーを生成・更新する処理
        ============================== */
        const display = document.getElementById('month-year-display');
        const daysContainer = document.getElementById('calendar-days');
        const prevBtn = document.getElementById('prev-month');
        const nextBtn = document.getElementById('next-month');

        let calendarDate = new Date();
        const weekdays = ['日', '月', '火', '水', '木', '金', '土'];

        function renderCalendar() {
            daysContainer.innerHTML = '';

            const year = calendarDate.getFullYear();
            const month = calendarDate.getMonth();

            // 「◯◯年 ◯月」を書き換え
            display.textContent = `${year}年 ${month + 1}月`;

            // 曜日（日〜土）を生成
            weekdays.forEach(day => {
                const dayHeader = document.createElement('div');
                dayHeader.classList.add('day-of-week');
                dayHeader.textContent = day;
                daysContainer.appendChild(dayHeader);
            });

            const firstDayIndex = new Date(year, month, 1).getDay();
            const lastDay = new Date(year, month + 1, 0).getDate();
            const today = new Date();

            // 初日の前の空白マス
            for (let i = 0; i < firstDayIndex; i++) {
                const emptyCell = document.createElement('div');
                emptyCell.classList.add('calendar-day', 'empty');
                daysContainer.appendChild(emptyCell);
            }

            // 日付（1日〜最終日）を生成
            for (let day = 1; day <= lastDay; day++) {
                const dayCell = document.createElement('div');
