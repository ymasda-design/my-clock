<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>JR Station Clock - Perfect Replica</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #004d26; /* JRの濃い緑 */
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            font-family: "Helvetica Neue", Arial, sans-serif;
            box-sizing: border-box;
        }

        /* ★外枠：ご要望通り縦方向を大きくし、本物のような大きな角丸にしました */
        .clock-frame {
            width: 188px;
            height: 160px;
            background-color: #004d26; 
            border: 4px solid #ccff00; /* 蛍光黄色の細い縁ライン */
            border-radius: 24px;       /* 本物らしい大きな角丸 */
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        /* ★文字盤：写真通り、綺麗な正円（丸型）の蛍光黄色ベース */
        .clock-face {
            width: 136px;
            height: 136px;
            border-radius: 50%;
            position: relative;
            background-color: #ccff00;
        }

        /* 数字全体の共通設定（円形に綺麗に配置するためのベース） */
        .number {
            position: absolute;
            width: 100%;
            height: 100%;
            text-align: center;
            font-size: 18px; /* 写真に合わせて数字を少し大きめで力強く */
            font-weight: 900;
            color: #111111;
            padding-top: 2px;
            box-sizing: border-box;
        }

        /* 本物と同じ、綺麗な正円の角度に合わせて回転配置 */
        .n1  { transform: rotate(30deg);  } .n1 span  { display: block; transform: rotate(-30deg); }
        .n2  { transform: rotate(60deg);  } .n2 span  { display: block; transform: rotate(-60deg); }
        .n3  { transform: rotate(90deg);  } .n3 span  { display: block; transform: rotate(-90deg); }
        .n4  { transform: rotate(120deg); } .n4 span  { display: block; transform: rotate(-120deg); }
        .n5  { transform: rotate(150deg); } .n5 span  { display: block; transform: rotate(-150deg); }
        .n6  { transform: rotate(180deg); } .n6 span  { display: block; transform: rotate(-180deg); }
        .n7  { transform: rotate(210deg); } .n7 span  { display: block; transform: rotate(-210deg); }
        .n8  { transform: rotate(240deg); } .n8 span  { display: block; transform: rotate(-240deg); }
        .n9  { transform: rotate(270deg); } .n9 span  { display: block; transform: rotate(-270deg); }
        .n10 { transform: rotate(300deg); } .n10 span { display: block; transform: rotate(-300deg); }
        .n11 { transform: rotate(330deg); } .n11 span { display: block; transform: rotate(-330deg); }
        .n12 { transform: rotate(0deg);   } .n12 span { display: block; transform: rotate(0deg); }

        /* 中心点（写真のようなシルバー／黒のピン） */
        .clock-face::after {
            content: '';
            width: 8px;
            height: 8px;
            background-color: #111111;
            border: 2px solid #ffffff;
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
        }

        /* 針の設定（写真に合わせた、先端が平らで力強い黒い針） */
        .hand {
            position: absolute;
            bottom: 50%;
            left: 50%;
            transform-origin: bottom;
            transform: translateX(-50%) rotate(0deg);
            background-color: #111111;
        }
        /* 丸い文字盤にぴったり合う長さに調整 */
        .hour { width: 6px; height: 32px; border-radius: 2px; }
        .minute { width: 4.5px; height: 48px; border-radius: 2px; }
        .second { width: 1.5px; height: 54px; background-color: #ff3333; } /* 秒針は駅時計の赤 */
    </style>
</head>
<body>

    <!-- 外枠（緑の四角） -->
    <div class="clock-frame">
        <!-- 内枠（黄色の丸） -->
        <div class="clock-face">
            <div class="number n1"><span>1</span></div>
            <div class="number n2"><span>2</span></div>
            <div class="number n3"><span>3</span></div>
            <div class="number n4"><span>4</span></div>
            <div class="number n5"><span>5</span></div>
            <div class="number n6"><span>6</span></div>
            <div class="number n7"><span>7</span></div>
            <div class="number n8"><span>8</span></div>
            <div class="number n9"><span>9</span></div>
            <div class="number n10"><span>10</span></div>
            <div class="number n11"><span>11</span></div>
            <div class="number n12"><span>12</span></div>
            
            <div class="hand hour" id="hourHand"></div>
            <div class="hand minute" id="minuteHand"></div>
            <div class="hand second" id="secondHand"></div>
        </div>
    </div>

    <script>
        function updateClock() {
            const now = new Date();
            const hourDeg = (now.getHours() % 12) * 30 + now.getMinutes() * 0.5;
            const minuteDeg = now.getMinutes() * 6;
            const secondDeg = now.getSeconds() * 6;

            document.getElementById('hourHand').style.transform = `translateX(-50%) rotate(${hourDeg}deg)`;
            document.getElementById('minuteHand').style.transform = `translateX(-50%) rotate(${minuteDeg}deg)`;
            document.getElementById('secondHand').style.transform = `translateX(-50%) rotate(${secondDeg}deg)`;
        }

        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
