<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JR駅風時計 ＆ カレンダーウィジェット</title>
    <style>
        /* 全体の背景（駅の掲示板が映える真っ黒な空間） */
        body {
            font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
            background-color: #000000;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        /* ウィジェット全体の黒い筐体（JRの電光掲示板の枠イメージ） */
        .jr-widget {
            background-color: #111111;
            border: 3px solid #333333;
            border-radius: 12px;
            width: 380px;
            padding: 20px;
            box-sizing: border-box;
            box-shadow: 0 0 20px rgba(0, 255, 100, 0.1);
        }

        /* ==============================
           JR駅風 時計セクション
        ============================== */
        .clock-section {
            text-align: center;
            padding-bottom: 18px;
            border-bottom: 2px dashed #333333; /* 鉄道掲示板風の区切り */
        }

        /* LED発光を再現したデジタル時計 */
        .clock-time {
            font-size: 52px;
            font-weight: bold;
            color: #00ff66; /* 鮮やかなJRグリーン */
            text-shadow: 0 0 10px rgba(0, 255, 102, 0.6);
            font-family: 'Courier New', Courier, monospace;
            letter-spacing: 2px;
        }

        /* オレンジLED風の日付表示 */
        .clock-date {
            font-size: 16px;
            font-weight: bold;
            color: #ff9900; /* LEDのオレンジ（アンバー） */
            text-shadow: 0 0 8px rgba(255, 153, 0, 0.6);
            margin-top: 6px;
        }

        /* ==============================
           運行モニター風 カレンダーセクション
        ============================== */
        .calendar-section {
            margin-top: 15px;
        }

        /* 年月表示と切り替えボタン */
        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .calendar-header h2 {
            margin: 0;
            font-size: 18px;
            color: #ff9900; /* 統一感のあるオレンジ */
            text-shadow: 0 0 5px rgba(255, 153, 0, 0.4);
        }

        /* 鉄道システム風の四角いコマンドボタン */
        .nav-btn {
            background: #222222;
            border: 1px solid #444444;
            color: #00ff66;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            padding: 4px 12px;
            border-radius: 4px;
        }

        .nav-btn:hover {
            background-color: #333333;
            border-color: #00ff66;
        }

        /* カレンダーのグリッドマス */
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 6px;
            text-align: center;
        }

        /* 曜日の行 */
        .day-of-week {
            font-size: 12px;
            font-weight: bold;
            color: #cccccc;
            padding-bottom: 6px;
            border-bottom: 1px solid #333333;
        }

        /* 日付のマス */
        .calendar-day {
            font-size: 14px;
            font-weight: bold;
            color: #ffffff;
            height: 34px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 4px;
            transition: background 0.2s;
        }

        .calendar-day:hover:not(.empty) {
            background-color: #222222;
        }

        .empty {
            cursor: default;
        }

        /* 「今日」の列車運行風ハイライト（枠線で強調） */
        .today {
            border: 2px solid #00ff66 !important;
            color: #00ff66 !important;
            text-shadow: 0 0 5px rgba(0, 255, 102, 0.5);
            background-color: rgba(0, 255, 102, 0.1);
        }

        /* 土曜（青）と日曜（赤）の識別LEDカラー */
        .day-of-week:nth-child(7n+1), .calendar-grid div:nth-child(7n+1):not(.empty):not(.today) {
            color: #ff4d4d; /* 警告灯のような赤 */
        }
        .day-of-week:nth-child(7n), .calendar-grid div:nth-child(7n):not(.empty):not(.today) {
            color: #3399ff; /* 清潔感のある青 */
        }
    </style>
</head>
<body>

    <div class="jr-widget">
        <!-- 【JR駅風 時計エリア】 -->
        <div class="clock-section">
            <div class="clock-time" id="clock-time">00:00:00</div>
            <div class="clock-date" id="clock-date">----年--月--日 (水)</div>
        </div>

        <!-- 【運行モニター風 カレンダーエリア】 -->
        <div class="calendar-section">
            <div class="calendar-header">
                <button class="nav-btn" id="prev-month">前月</button>
                <h2 id="month-year-display">----年 --月</h2>
                <button class="nav-btn" id="next-month">次月</button>
            </div>
            <div class="calendar-grid" id="calendar-days"></div>
        </div>
    </div>

    <script>
        /* ==============================
           時計の制御スクリプト
        ============================== */
        function updateClock() {
            const now = new Date();
            
            // 時間の取得とゼロ埋め
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('clock-time').textContent = `${hours}:${minutes}:${seconds}`;

            // 日付と曜日の取得
            const year = now.getFullYear();
            const month = now.getMonth() + 1;
            const date = now.getDate();
            const dayList = ['日', '月', '火', '水', '木', '金', '土'];
            const dayOfWeek = dayList[now.getDay()];
            
            document.getElementById('clock-date').textContent = `${year}年${month}月${date}日 (${dayOfWeek})`;
        }
        
        setInterval(updateClock, 1000);
        updateClock(); // 初回起動


        /* ==============================
           カレンダーの制御スクリプト
        ============================== */
        const display = document.getElementById('month-year-display');
        const daysContainer = document.getElementById('calendar-days');
        const prevBtn = document.getElementById('prev-month');
        const nextBtn = document.getElementById('next-month');

        let calendarDate = new Date();
        const weekdays = ['日', '月', '火', '水', '木', '金', '土'];

        function renderCalendar() {
            daysContainer.innerHTML = '';

            const year = calendarDate.getFullYear();
            const month = calendarDate.getMonth();

            display.textContent = `${year}年 ${month + 1}月`;

            // 曜日ヘッダーの生成
            weekdays.forEach(day => {
                const dayHeader = document.createElement('div');
                dayHeader.classList.add('day-of-week');
                dayHeader.textContent = day;
                daysContainer.appendChild(dayHeader);
            });

            const firstDayIndex = new Date(year, month, 1).getDay();
            const lastDay = new Date(year, month + 1, 0).getDate();
            const today = new Date();

            // 空白マスの生成
            for (let i = 0; i < firstDayIndex; i++) {
                const emptyCell = document.createElement('div');
                emptyCell.classList.add('calendar-day', 'empty');
                daysContainer.appendChild(emptyCell);
            }

            // 日付マスの生成
            for (let day = 1; day <= lastDay; day++) {
                const dayCell = document.createElement('div');
                dayCell.classList.add('calendar-day');
                dayCell.textContent = day;

                // 今日をJRグリーン枠でハイライト
                if (day === today.getDate() && month === today.getMonth() && year === today.getFullYear()) {
                    dayCell.classList.add('today');
                }

                daysContainer.appendChild(dayCell);
            }
        }

        // 月切り替えイベント
        prevBtn.addEventListener('click', () => {
            calendarDate.setMonth(calendarDate.getMonth() - 1);
            renderCalendar();
        });

        nextBtn.addEventListener('click', () => {
            calendarDate.setMonth(calendarDate.getMonth() + 1);
            renderCalendar();
        });

        renderCalendar();
    </script>
</body>
</html>
