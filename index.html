<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>時計 ＆ カレンダー ウィジェット</title>
    <style>
        /* 全体の配置設定 */
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f0f2f5;
        }

        /* ウィジェット全体のコンテナ */
        .widget-container {
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            width: 360px;
            padding: 24px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 20px; /* 時計とカレンダーの間の隙間 */
        }

        /* ==============================
           時計セクションのスタイル
        ============================== */
        .clock-section {
            text-align: center;
            padding-bottom: 20px;
            border-bottom: 2px dashed #f0f2f5; /* 区切り線 */
        }

        .clock-time {
            font-size: 48px;
            font-weight: 700;
            color: #333333;
            letter-spacing: 1px;
            font-variant-numeric: tabular-nums; /* 数字の幅を統一してガタつき防止 */
        }

        .clock-date {
            font-size: 14px;
            color: #666666;
            margin-top: 4px;
            font-weight: 500;
        }

        /* ==============================
           カレンダーセクションのスタイル
        ============================== */
        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .calendar-header h2 {
            margin: 0;
            font-size: 18px;
            color: #333333;
            font-weight: 600;
        }

        .nav-btn {
            background: none;
            border: none;
            font-size: 16px;
            color: #007bff;
            cursor: pointer;
            padding: 4px 10px;
            border-radius: 8px;
            transition: background 0.2s;
        }

        .nav-btn:hover {
            background-color: #f0f7ff;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 6px;
            text-align: center;
        }

        .day-of-week {
            font-size: 11px;
            font-weight: bold;
            color: #888888;
            padding-bottom: 4px;
        }

        .calendar-day {
            font-size: 13px;
            color: #333333;
            height: 34px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 50%;
            cursor: pointer;
            transition: background 0.2s;
        }

        .calendar-day:hover:not(.empty) {
            background-color: #f0f2f5;
        }

        .empty {
            cursor: default;
        }

        /* 今日のハイライト */
        .today {
            background-color: #007bff !important;
            color: #ffffff !important;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0, 123, 255, 0.3);
        }

        /* 土日の色分け */
        .day-of-week:nth-child(7n+1), .calendar-grid div:nth-child(7n+1):not(.empty):not(.today) {
            color: #dc3545;
        }
        .day-of-week:nth-child(7n), .calendar-grid div:nth-child(7n):not(.empty):not(.today) {
            color: #0056b3;
        }
    </style>
</head>
<body>

    <div class="widget-container">
        <!-- 【時計エリア】 -->
        <div class="clock-section">
            <div class="clock-time" id="clock-time">00:00:00</div>
            <div class="clock-date" id="clock-date">----年--月--日 (水)</div>
        </div>

        <!-- 【カレンダーエリア】 -->
        <div class="calendar-section">
            <div class="calendar-header">
                <button class="nav-btn" id="prev-month">&lt;</button>
                <h2 id="month-year-display">----年 --月</h2>
                <button class="nav-btn" id="next-month">&gt;</button>
            </div>
            <div class="calendar-grid" id="calendar-days"></div>
        </div>
    </div>

    <script>
        /* ==============================
           時計の制御処理
        ============================== */
        function updateClock() {
            const now = new Date();
            
            // 時間のシミュレーション
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('clock-time').textContent = `${hours}:${minutes}:${seconds}`;

            // 日付の表示更新
            const year = now.getFullYear();
            const month = now.getMonth() + 1;
            const date = now.getDate();
            const dayList = ['日', '月', '火', '水', '木', '金', '土'];
            const dayOfWeek = dayList[now.getDay()];
            
            document.getElementById('clock-date').textContent = `${year}年${month}月${date}日 (${dayOfWeek})`;
        }
        
        // 1秒ごとに時計を更新
        setInterval(updateClock, 1000);
        updateClock(); // 初回起動用


        /* ==============================
           カレンダーの制御処理
        ============================== */
        const display = document.getElementById('month-year-display');
        const daysContainer = document.getElementById('calendar-days');
        const prevBtn = document.getElementById('prev-month');
        const nextBtn = document.getElementById('next-month');

        let calendarDate = new Date();
        const weekdays = ['日', '月', '火', '水', '木', '金', '土'];

        function renderCalendar() {
            daysContainer.innerHTML = '';

            const year = calendarDate.getFullYear();
            const month = calendarDate.getMonth();

            display.textContent = `${year}年 ${month + 1}月`;

            // 曜日ヘッダー
            weekdays.forEach(day => {
                const dayHeader = document.createElement('div');
                dayHeader.classList.add('day-of-week');
                dayHeader.textContent = day;
                daysContainer.appendChild(dayHeader);
            });

            const firstDayIndex = new Date(year, month, 1).getDay();
            const lastDay = new Date(year, month + 1, 0).getDate();
            const today = new Date();

            // 空白埋め
            for (let i = 0; i < firstDayIndex; i++) {
                const emptyCell = document.createElement('div');
                emptyCell.classList.add('calendar-day', 'empty');
                daysContainer.appendChild(emptyCell);
            }

            // 日付生成
            for (let day = 1; day <= lastDay; day++) {
                const dayCell = document.createElement('div');
                dayCell.classList.add('calendar-day');
                dayCell.textContent = day;

                if (day === today.getDate() && month === today.getMonth() && year === today.getFullYear()) {
                    dayCell.classList.add('today');
                }

                daysContainer.appendChild(dayCell);
            }
        }

        prevBtn.addEventListener('click', () => {
            calendarDate.setMonth(calendarDate.getMonth() - 1);
            renderCalendar();
        });

        nextBtn.addEventListener('click', () => {
            calendarDate.setMonth(calendarDate.getMonth() + 1);
            renderCalendar();
        });

        renderCalendar();
    </script>
</body>
</html>
