<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>JR Platform Clock - Rect</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #004d26; /* JRの濃い緑 */
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            font-family: "Helvetica Neue", Arial, sans-serif;
            box-sizing: border-box;
        }

        /* ★文字盤を丸（50%）から長方形（角丸6px）に変更、サイズも横長に拡大 */
        .clock {
            width: 156px;
            height: 84px;
            border: 3px solid #ccff00; /* 蛍光黄色の内枠 */
            border-radius: 6px;        /* 少しだけ角を丸くしてなじませる */
            position: relative;
            background-color: #ccff00; /* 蛍光黄色の文字盤 */
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }

        /* 文字盤の数字（長方形に合わせて位置の計算を調整） */
        .number {
            position: absolute;
            width: 100%;
            height: 100%;
            text-align: center;
            font-size: 13px;
            font-weight: 900;
            color: #004d26;
            box-sizing: border-box;
        }
        
        /* 四角い形状に合わせて数字が綺麗に見えるよう配置を微調整 */
        .n12 { top: 2px;   left: 0; }
        .n1  { top: 6px;   left: 32px; }
        .n2  { top: 18px;  left: 56px; }
        .n3  { top: 34px;  right: 6px; text-align: right; width: auto; }
        .n4  { bottom: 18px; left: 56px; }
        .n5  { bottom: 6px;  left: 32px; }
        .n6  { bottom: 2px;  left: 0; }
        .n7  { bottom: 6px;  right: 32px; }
        .n8  { bottom: 18px; right: 56px; }
        .n9  { top: 34px;  left: 6px; text-align: left; width: auto; }
        .n10 { top: 18px;  right: 56px; }
        .n11 { top: 6px;   right: 32px; }

        /* 中心点 */
        .clock::after {
            content: '';
            width: 6px;
            height: 6px;
            background-color: #004d26;
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
        }

        /* 針の設定 */
        .hand {
            position: absolute;
            bottom: 50%;
            left: 50%;
            transform-origin: bottom;
            transform: translateX(-50%) rotate(0deg);
            background-color: #004d26;
        }
        /* 横長になってもはみ出さないよう、針の長さを少しコンパクトに調整 */
        .hour { width: 4.5px; height: 20px; }
        .minute { width: 3.5px; height: 28px; }
        .second { width: 1px; height: 32px; background-color: #ff3333; }
    </style>
</head>
<body>

    <!-- 長方形のアナログ時計 -->
    <div class="clock">
        <div class="number n12">12</div>
        <div class="number n1">1</div>
        <div class="number n2">2</div>
        <div class="number n3">3</div>
        <div class="number n4">4</div>
        <div class="number n5">5</div>
        <div class="number n6">6</div>
        <div class="number n7">7</div>
        <div class="number n8">8</div>
        <div class="number n9">9</div>
        <div class="number n10">10</div>
        <div class="number n11">11</div>
        
        <div class="hand hour" id="hourHand"></div>
        <div class="hand minute" id="minuteHand"></div>
        <div class="hand second" id="secondHand"></div>
    </div>

    <script>
        function updateClock() {
            const now = new Date();
            const hourDeg = (now.getHours() % 12) * 30 + now.getMinutes() * 0.5;
            const minuteDeg = now.getMinutes() * 6;
            const secondDeg = now.getSeconds() * 6;

            document.getElementById('hourHand').style.transform = `translateX(-50%) rotate(${hourDeg}deg)`;
            document.getElementById('minuteHand').style.transform = `translateX(-50%) rotate(${minuteDeg}deg)`;
            document.getElementById('secondHand').style.transform = `translateX(-50%) rotate(${secondDeg}deg)`;
        }

        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
