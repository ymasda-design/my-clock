<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>JR Platform Clock - Large Rect</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #004d26; /* JRの濃い緑 */
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            font-family: "Helvetica Neue", Arial, sans-serif;
            box-sizing: border-box;
        }

        /* ★文字盤の長方形を20%拡大（横156px→188px、縦84px→100px） */
        .clock {
            width: 188px;
            height: 100px;
            border: 4px solid #ccff00; /* 蛍光黄色の内枠（少し太く） */
            border-radius: 8px;
            position: relative;
            background-color: #ccff00; /* 蛍光黄色の文字盤 */
            box-shadow: 0 2px 6px rgba(0,0,0,0.5);
        }

        /* 数字全体の共通設定（フォントサイズを13pxから15pxに拡大） */
        .number {
            position: absolute;
            font-size: 15px;
            font-weight: 900;
            color: #004d26;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        /* 拡大した長方形に合わせて、各数字の配置間隔を20%ベースで再計算 */
        .n12 { top: 2px;    left: calc(50% - 12px); }
        .n1  { top: 4px;    right: 40px; }
        .n2  { top: 22px;   right: 14px; }
        .n3  { top: calc(50% - 12px); right: 4px; }
        .n4  { bottom: 22px; right: 14px; }
        .n5  { bottom: 4px;  right: 40px; }
        .n6  { bottom: 2px; left: calc(50% - 12px); }
        .n7  { bottom: 4px;  left: 40px; }
        .n8  { bottom: 22px; left: 14px; }
        .n9  { top: calc(50% - 12px); left: 4px; }
        .n10 { top: 22px;   left: 14px; }
        .n11 { top: 4px;    left: 40px; }

        /* 中心点（少し大きく） */
        .clock::after {
            content: '';
            width: 8px;
            height: 8px;
            background-color: #004d26;
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
        }

        /* 針の設定（拡大に合わせて太さと長さを20%アップ） */
        .hand {
            position: absolute;
            bottom: 50%;
            left: 50%;
            transform-origin: bottom;
            transform: translateX(-50%) rotate(0deg);
            background-color: #004d26;
        }
        .hour { width: 5.5px; height: 22px; }
        .minute { width: 4.5px; height: 32px; }
        .second { width: 1.5px; height: 36px; background-color: #ff3333; }
    </style>
</head>
<body>

    <!-- 20%拡大した長方形アナログ時計 -->
    <div class="clock">
        <div class="number n12">12</div>
        <div class="number n1">1</div>
        <div class="number n2">2</div>
        <div class="number n3">3</div>
        <div class="number n4">4</div>
        <div class="number n5">5</div>
        <div class="number n6">6</div>
        <div class="number n7">7</div>
        <div class="number n8">8</div>
        <div class="number n9">9</div>
        <div class="number n10">10</div>
        <div class="number n11">11</div>
        
        <div class="hand hour" id="hourHand"></div>
        <div class="hand minute" id="minuteHand"></div>
        <div class="hand second" id="secondHand"></div>
    </div>

    <script>
        function updateClock() {
            const now = new Date();
            const hourDeg = (now.getHours() % 12) * 30 + now.getMinutes() * 0.5;
            const minuteDeg = now.getMinutes() * 6;
            const secondDeg = now.getSeconds() * 6;

            document.getElementById('hourHand').style.transform = `translateX(-50%) rotate(${hourDeg}deg)`;
            document.getElementById('minuteHand').style.transform = `translateX(-50%) rotate(${minuteDeg}deg)`;
            document.getElementById('secondHand').style.transform = `translateX(-50%) rotate(${secondDeg}deg)`;
        }

        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
