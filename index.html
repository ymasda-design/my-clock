<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>JR Platform Clock - Perfect Rect</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #004d26; /* JRの濃い緑 */
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            font-family: "Helvetica Neue", Arial, sans-serif;
            box-sizing: border-box;
        }

        /* 文字盤の長方形（横188px、縦100px） */
        .clock {
            width: 188px;
            height: 100px;
            border: 4px solid #ccff00; /* 蛍光黄色の内枠 */
            border-radius: 8px;
            position: relative;
            background-color: #ccff00; /* 蛍光黄色の文字盤 */
            box-shadow: 0 2px 6px rgba(0,0,0,0.5);
        }

        /* 数字全体の共通設定（JavaScriptで位置を自動制御するため、ここでは基本設定のみ） */
        .number {
            position: absolute;
            font-size: 15px;
            font-weight: 900;
            color: #004d26;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            /* 数字の中心を基準に配置できるようにする */
            transform: translate(-50%, -50%); 
        }

        /* 中心点 */
        .clock::after {
            content: '';
            width: 8px;
            height: 8px;
            background-color: #004d26;
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
        }

        /* 針の設定 */
        .hand {
            position: absolute;
            bottom: 50%;
            left: 50%;
            transform-origin: bottom;
            transform: translateX(-50%) rotate(0deg);
            background-color: #004d26;
        }
        .hour { width: 5.5px; height: 22px; }
        .minute { width: 4.5px; height: 32px; }
        .second { width: 1.5px; height: 36px; background-color: #ff3333; }
    </style>
</head>
<body>

    <!-- 長方形アナログ時計 -->
    <div class="clock" id="clockBoard">
        <!-- 数字はJavaScriptで自動生成＆等間隔に美しく配置します -->
        
        <div class="hand hour" id="hourHand"></div>
        <div class="hand minute" id="minuteHand"></div>
        <div class="hand second" id="secondHand"></div>
    </div>

    <script>
        // --- 数字を長方形の形に合わせて均等に配置する処理 ---
        const clock = document.getElementById('clockBoard');
        
        // 配置する範囲（文字盤のサイズから、少し内側に余白を持たせた数値）
        const width = 152;  // 左右の広がり具合
        const height = 72;  // 上下の広がり具合

        for (let i = 1; i <= 12; i++) {
            // 時計の各時間の角度（ラジアン）を計算
            const angle = (i * 30 - 90) * (Math.PI / 180);
            
            // 四角形の軌道上に数字を配置するための高度な数学計算
            const cos = Math.cos(angle);
            const sin = Math.sin(angle);
            const u = Math.max(Math.abs(cos * height), Math.abs(sin * width));
            
            // 時計の中心（50%, 50%）からの正確な位置を割り出す
            const x = 50 + (cos * width * height) / u / 188 * 50;
            const y = 50 + (sin * width * height) / u / 100 * 50;

            // 数字のタグを作って文字盤に追加
            const numDiv = document.createElement('div');
            numDiv.className = 'number';
            numDiv.innerText = i;
            numDiv.style.left = `${x}%`;
            numDiv.style.top = `${y}%`;
            clock.appendChild(numDiv);
        }

        // --- 時計を動かす処理 ---
        function updateClock() {
            const now = new Date();
            const hourDeg = (now.getHours() % 12) * 30 + now.getMinutes() * 0.5;
            const minuteDeg = now.getMinutes() * 6;
            const secondDeg = now.getSeconds() * 6;

            document.getElementById('hourHand').style.transform = `translateX(-50%) rotate(${hourDeg}deg)`;
            document.getElementById('minuteHand').style.transform = `translateX(-50%) rotate(${minuteDeg}deg)`;
            document.getElementById('secondHand').style.transform = `translateX(-50%) rotate(${secondDeg}deg)`;
        }

        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
